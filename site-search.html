<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索结果 - 免费字体下载</title>
<link rel="stylesheet" href="/wp-content/uploads/font-upload/fonts.css?v=6">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(circle at top,rgba(255,255,255,.06),transparent 26%),linear-gradient(180deg,#0d0d10 0%,#0a0a0d 100%);font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;color:#fff;min-height:100vh;padding-top:112px}
.header{position:fixed;top:14px;left:0;right:0;z-index:120;padding:0 18px;pointer-events:none}
.header-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:14px 18px;border:1px solid rgba(255,255,255,.09);border-radius:24px;background:rgba(14,14,18,.74);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 18px 46px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.05);pointer-events:auto}
.logo{display:inline-flex;align-items:center;text-decoration:none;flex:0 0 auto}
.logo img{height:34px;display:block}
.header-search-form{flex:1;display:flex;gap:10px;align-items:center;min-width:0}
.header-search-input{flex:1;width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;border-radius:999px;font-size:14px;outline:none}
.header-search-input:focus{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.06)}
.header-search-input::placeholder{color:rgba(255,255,255,.34)}
.header-search-btn{padding:12px 18px;border:none;border-radius:999px;background:#fff;color:#0b0b0d;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.header-search-btn:hover{background:#ececec}
.auth-bar{display:flex;align-items:center;gap:10px;flex:0 0 auto;padding:6px;border-radius:999px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.auth-link{padding:10px 16px;border-radius:999px;color:rgba(255,255,255,.72);text-decoration:none;font-size:14px;transition:all .24s ease}
.auth-link:hover{color:#fff;background:rgba(255,255,255,.05)}
.auth-link:last-of-type{background:#fff;color:#0b0b0d;font-weight:700}
.auth-link:last-of-type:hover{background:#ececec}
.auth-sep{display:none}
.user-name{padding:10px 16px;border-radius:999px;color:#fff;font-size:14px;background:rgba(255,255,255,.04)}
.container{max-width:1240px;margin:0 auto;padding:36px 20px 40px}.hero{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:26px}.title{font-size:34px;font-weight:700}.sub{color:rgba(255,255,255,.48);margin-top:8px}.jump-links{display:flex;gap:10px;flex-wrap:wrap}.jump-links a{padding:10px 14px;border-radius:999px;text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03)}
.section{margin-top:28px}.section-head{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px}.section-title{font-size:22px;font-weight:700}.count{color:rgba(255,255,255,.45);font-size:13px}.font-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.font-item{background:#1a1a1a;border-radius:12px;padding:20px;cursor:pointer;transition:background .2s;display:flex;flex-direction:column;align-items:center;text-align:center;border:1px solid #2a2a2a}.font-item:hover{background:#222;border-color:#3a3a3a}.font-preview{font-size:36px;color:#fff;margin-bottom:12px;height:60px;display:flex;align-items:center;justify-content:center;width:100%}.font-name{color:rgba(255,255,255,.75);font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%}.font-cat{color:rgba(255,255,255,.35);font-size:11px;margin-top:6px}
.prompt-grid{column-count:3;column-width:320px;column-gap:20px}.card{break-inside:avoid;margin-bottom:20px;background:#1a1a1a;border-radius:12px;overflow:hidden;cursor:pointer;position:relative}.card img{width:100%;display:block}.card-body{padding:14px}.card-prompt{color:#aaa;font-size:13px;line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-all}.card-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:50px;font-size:11px}.empty{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:36px;color:rgba(255,255,255,.45);text-align:center}
@media(max-width:900px){body{padding-top:128px}.header{top:10px;padding:0 12px}.header-inner{gap:12px;padding:12px 14px}.font-grid{grid-template-columns:repeat(2,1fr)}.prompt-grid{column-count:2;column-gap:12px}.hero{flex-direction:column;align-items:flex-start}}
@media(max-width:600px){body{padding-top:182px}.header-inner{border-radius:20px;flex-wrap:wrap}.header-search-form{order:3;flex-basis:100%;flex-direction:column;align-items:stretch}.header-search-btn{width:100%}.logo img{height:30px}.auth-bar{gap:6px;padding:4px}.auth-link,.user-name{padding:9px 12px;font-size:13px}.container{padding:20px 12px}.font-grid{grid-template-columns:repeat(2,1fr)}.prompt-grid{column-count:1}.title{font-size:28px}}
</style>
<style>
.fm-filing-overlay{display:none;position:fixed;inset:0;z-index:99999;background:#0b0b0d;align-items:center;justify-content:center;padding:24px}
.fm-filing-card{width:min(560px,100%);background:#141418;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:36px 28px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.42)}
.fm-filing-title{font-size:32px;font-weight:700;margin-bottom:10px}
.fm-filing-sub{color:rgba(255,255,255,.55);font-size:15px;line-height:1.8}
body.filing-mode{padding-top:0 !important;overflow:hidden}
body.filing-mode>*{display:none !important}
body.filing-mode>.fm-filing-overlay{display:flex !important}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="/font-index.html" class="logo"><img src="/wp-content/uploads/logo-zitipai.png" alt="logo"></a>
    <form class="header-search-form" id="siteSearchForm">
      <input type="text" class="header-search-input" id="siteSearchInput" placeholder="搜索字体、提示词、分类">
      <button type="submit" class="header-search-btn">搜索</button>
    </form>
    <div class="auth-bar" id="authBar">
      <a href="/login.html" class="auth-link">登录</a>
      <span class="auth-sep">|</span>
      <a href="/register.html" class="auth-link">注册</a>
    </div>
  </div>
</header>
<div class="container">
  <div class="hero"><div><div class="title">搜索结果</div><div class="sub" id="heroSub">正在搜索...</div></div><div class="jump-links"><a href="#fontResults">字体结果</a><a href="#promptResults">提示词结果</a></div></div>
  <section class="section" id="fontResults"><div class="section-head"><div class="section-title">字体</div><div class="count" id="fontCount"></div></div><div class="font-grid" id="fontGrid"></div></section>
  <section class="section" id="promptResults"><div class="section-head"><div class="section-title">字体提示词</div><div class="count" id="promptCount"></div></div><div class="prompt-grid" id="promptGrid"></div></section>
</div>
<script src="/checkauth.js"></script>
<script>
(function(){var form=document.getElementById('siteSearchForm'),input=document.getElementById('siteSearchInput');var params=new URLSearchParams(window.location.search);var q=(params.get('q')||'').trim();if(q) input.value=q; form.addEventListener('submit',function(e){e.preventDefault(); var kw=(input.value||'').trim(); location.href='/site-search.html'+(kw?'?q='+encodeURIComponent(kw):'');});})();
</script>
<script>
(function(){
 var params=new URLSearchParams(window.location.search), q=(params.get('q')||'').trim();
 var heroSub=document.getElementById('heroSub'), fontGrid=document.getElementById('fontGrid'), promptGrid=document.getElementById('promptGrid'), fontCount=document.getElementById('fontCount'), promptCount=document.getElementById('promptCount');
 function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
 function escapeFontFamily(name){return String(name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
 heroSub.textContent = q ? ('关键词：'+q) : '请输入关键词开始搜索';
 if(!q){fontGrid.innerHTML='<div class="empty" style="grid-column:1/-1">请输入搜索关键词</div>'; promptGrid.innerHTML='<div class="empty">请输入搜索关键词</div>'; return;}
 fetch('/api-fonts.php?n=40&q='+encodeURIComponent(q)).then(function(r){return r.json();}).then(function(list){list=Array.isArray(list)?list:[]; fontCount.textContent='共 '+list.length+' 条'; if(!list.length){fontGrid.innerHTML='<div class="empty" style="grid-column:1/-1">没有找到匹配的字体</div>'; return;} fontGrid.innerHTML=list.map(function(f){var preview=f.preview_text||f.font_name||'字体'; return '<div class="font-item" onclick="location.href=\'/font/'+encodeURIComponent(f.font_slug)+'/index.html\'"><div class="font-preview" style="font-family:\''+escapeFontFamily(f.font_class||'')+'\',-apple-system,BlinkMacSystemFont,\'Microsoft YaHei\',sans-serif">'+esc(preview)+'</div><div class="font-name">'+esc(f.font_name||preview)+'</div><div class="font-cat">'+esc(f.category||'')+'</div></div>';}).join('');}).catch(function(){fontGrid.innerHTML='<div class="empty" style="grid-column:1/-1">字体搜索加载失败</div>';});
 fetch('/api-prompts.php?n=30&q='+encodeURIComponent(q)).then(function(r){return r.json();}).then(function(data){var items=(data&&data.items)||[]; promptCount.textContent='共 '+items.length+' 条'; if(!items.length){promptGrid.innerHTML='<div class="empty">没有找到匹配的提示词</div>'; return;} promptGrid.innerHTML=items.map(function(item){return '<div class="card"><div class="card-tag">'+esc(item.category||'其他')+'</div><img src="'+esc(item.image_url||'')+'" alt=""><div class="card-body"><p class="card-prompt">'+esc(item.prompt||'')+'</p></div></div>';}).join('');}).catch(function(){promptGrid.innerHTML='<div class="empty">提示词搜索加载失败</div>';});
})();
</script>
<script>
(function(){
  function enable(){
    if(!document.body || document.body.classList.contains('filing-mode')) return;
    var overlay=document.createElement('div');
    overlay.className='fm-filing-overlay';
    overlay.innerHTML='<div class="fm-filing-card"><div class="fm-filing-title">网站备案中</div><div class="fm-filing-sub">站点内容暂时关闭，备案完成后恢复访问。</div></div>';
    document.body.appendChild(overlay);
    document.body.classList.add('filing-mode');
  }
  window.__fmEnableFilingMode=enable;
  fetch('/wp-json/font-manager/v1/home-assets',{cache:'no-store'})
    .then(function(r){return r.ok ? r.json() : null;})
    .then(function(data){ if(data && data.filing_mode){ enable(); } })
    .catch(function(){});
})();
</script>
</body>
</html>
