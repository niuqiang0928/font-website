<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - FONT GALLERY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative}
.auth-logo{font-size:13px;letter-spacing:3px;color:#444;margin-bottom:40px;text-align:center}
.auth-logo a{color:inherit;text-decoration:none}
.auth-card{background:#1a1a1a;border:1px solid #222;border-radius:18px;padding:40px 36px;width:100%;max-width:400px}
.auth-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:1px}
.auth-sub{color:#555;font-size:13px;margin-bottom:28px}
.auth-form{display:flex;flex-direction:column;gap:0}
.form-group{margin-bottom:14px}
.form-label{display:block;color:#555;font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;background:#111;border:1px solid #2a2a2a;border-radius:10px;color:#fff;font-size:15px;outline:none;transition:border-color .2s;box-sizing:border-box}
.form-input:focus{border-color:#555}
.form-input::placeholder{color:#444}
.form-btn{width:100%;padding:13px;background:#fff;color:#000;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;letter-spacing:.5px}
.form-btn:hover{background:#ddd;transform:scale(1.01)}
.form-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.form-error{background:#2a1010;border:1px solid #5a2020;color:#e55;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.form-error.show{display:block}
.auth-footer{text-align:center;margin-top:20px;color:#444;font-size:13px}
.auth-footer a{color:#777;text-decoration:none;transition:color .2s}
.auth-footer a:hover{color:#fff}
.wp-site-text{color:#555;font-size:11px;margin-top:20px;text-align:center;letter-spacing:.5px}
.wp-site-text a{color:#666;text-decoration:none}
.wp-site-text a:hover{color:#999}
@media(max-width:480px){.auth-card{padding:30px 24px}}
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-logo"><a href="/font-index.html">FONT GALLERY</a></div>
  <div class="auth-card">
    <h1 class="auth-title">登录账号</h1>
    <p class="auth-sub">登录后即可下载所有字体</p>
    <div class="form-error" id="loginError"></div>
    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" name="username" class="form-input" placeholder="输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-input" placeholder="输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="form-btn" id="loginBtn">登 录</button>
    </form>
    <p class="auth-footer">还没有账号？<a href="/register.html">立即注册</a></p>
    <p class="wp-site-text"><a href="/font-index.html">← 返回字体下载页</a></p>
  </div>
</div>
<script>
(function() {
  var form = document.getElementById('loginForm');
  var btn  = document.getElementById('loginBtn');
  var err  = document.getElementById('loginError');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    err.classList.remove('show');
    err.textContent = '';
    btn.textContent = '登录中...';
    btn.disabled = true;

    var fd = new FormData();
    fd.append('username', form.username.value);
    fd.append('password', form.password.value);

    fetch('/wp-json/font-auth/v1/login', {
      method: 'POST',
      body: fd,
      credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        if (data.token) localStorage.setItem('font_auth_token', data.token);
        var redirect = new URLSearchParams(window.location.search).get('redirect') || '/font-index.html';
        window.location.href = redirect;
      } else {
        err.textContent = data.message || '登录失败，请检查用户名和密码';
        err.classList.add('show');
        btn.textContent = '登 录';
        btn.disabled = false;
      }
    })
    .catch(function() {
      err.textContent = '网络错误，请重试';
      err.classList.add('show');
      btn.textContent = '登 录';
      btn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
