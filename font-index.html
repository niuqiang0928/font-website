<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免费字体下载</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;color:#fff}
.header{background:#1a1a1a;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-size:20px;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:10px}
.logo-icon{font-size:24px}
.header-nav{display:flex;gap:8px}
.header-nav a{padding:6px 16px;border-radius:20px;color:#999;text-decoration:none;font-size:14px;transition:all .2s}
.header-nav a:hover{color:#fff}
.header-nav a.active{background:#fff;color:#000;font-weight:600}
.auth-bar{display:flex;align-items:center;gap:12px}
.auth-link{color:#999;text-decoration:none;font-size:14px;transition:color .2s}
.auth-link:hover{color:#fff}
.user-name{color:#fff;font-size:14px}

.carousel-wrap{padding:20px 20px 0;max-width:1400px;margin:0 auto;display:grid;grid-template-columns:3fr 1fr;gap:16px;height:360px}
.carousel-main{background:#1e1e1e;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;position:relative;overflow:hidden;cursor:pointer;border:1px solid #2a2a2a}
.carousel-main:hover{border-color:#3a3a3a}
.carousel-main .big-title{font-size:32px;font-weight:700;margin-bottom:8px}
.carousel-main .sub{font-size:13px;opacity:.5}
.carousel-side{display:grid;grid-template-rows:1fr 1fr;gap:16px}
.carousel-side .sq{background:#1e1e1e;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:14px;cursor:pointer;border:1px solid #2a2a2a}
.carousel-side .sq:hover{border-color:#3a3a3a}
.carousel-side .sq .txt{font-size:14px;font-weight:600;margin-bottom:6px}
.carousel-side .sq .sub{font-size:11px;opacity:.5}

.section-wrap{padding:20px;max-width:1400px;margin:0 auto}
.section-card{background:#1a1a1a;border-radius:16px;padding:40px 30px 80px;margin-bottom:20px;position:relative;border:1px solid #2a2a2a;display:flex;flex-direction:column}
.section-title{color:#fff;font-size:28px;font-weight:700;text-align:center;margin-bottom:12px}
.section-hint{color:rgba(255,255,255,.4);font-size:13px;text-align:center;margin-bottom:24px}
.section-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.section-grid.font-grid{grid-template-columns:repeat(4,1fr)}
.section-grid .item{background:#222;border-radius:12px;padding:16px;cursor:pointer;transition:background .2s;border:1px solid #2a2a2a}
.section-grid .item:hover{background:#2a2a2a;border-color:#3a3a3a}
.section-grid .item img{width:100%;border-radius:8px;margin-bottom:10px;display:block;aspect-ratio:16/9;object-fit:cover;background:#111}
.section-grid .item p{color:rgba(255,255,255,.7);font-size:13px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.font-item{background:#222;border-radius:12px;padding:20px;cursor:pointer;transition:background .2s;display:flex;flex-direction:column;align-items:center;text-align:center;border:1px solid #2a2a2a}
.font-item:hover{background:#2a2a2a;border-color:#3a3a3a}
.font-item .font-preview{font-size:36px;color:#fff;margin-bottom:12px;height:60px;display:flex;align-items:center;justify-content:center}
.font-item .font-name{color:rgba(255,255,255,.7);font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%}
.font-item .font-cat{color:rgba(255,255,255,.3);font-size:11px;margin-top:6px}
.more-btn{position:absolute;bottom:20px;right:24px;background:#333;border:1px solid #444;color:#fff;padding:8px 20px;border-radius:50px;font-size:13px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block;line-height:1.4}
.more-btn:hover{background:#444;border-color:#555}
.placeholder-block{background:#222;border-radius:8px;height:80px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:13px;border:1px solid #2a2a2a}
@media(max-width:900px){
 .carousel-wrap{grid-template-columns:1fr;height:auto}
 .carousel-side{grid-template-rows:auto;grid-template-columns:1fr 1fr}
 .section-grid{grid-template-columns:repeat(2,1fr)}
 .section-grid.font-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
 .header{padding:0 16px}
 .section-grid{grid-template-columns:1fr}
 .section-grid.font-grid{grid-template-columns:repeat(2,1fr)}
 .carousel-side{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="header">
<a href="/font-index.html" class="logo"><img src="/wp-content/uploads/logo-zitipai.png" height="36" alt="logo"></a>
<nav class="header-nav">
<a href="/font-index.html" class="active">首页</a>
<a href="/font-prompts.html">字体提示词</a>
<a href="/fonts.html">免费字体</a>
</nav>
<div class="auth-bar" id="authBar">
<a href="/login.html" class="auth-link">登录</a>
<span style="color:#444">|</span>
<a href="/register.html" class="auth-link">注册</a>
</div>
</header>

<div class="carousel-wrap">
<div class="carousel-main">
<div class="big-title">轮播图</div>
<div class="sub">(后台管理员自主上传)</div>
</div>
<div class="carousel-side">
<div class="sq"><div class="txt">正方形图片展示</div><div class="sub">后台管理员自主上传</div></div>
<div class="sq"><div class="txt">正方形图片展示</div><div class="sub">后台管理员自主上传</div></div>
</div>
</div>

<div class="section-wrap">
<div class="section-card">
<div class="section-title">字体提示词展示</div>
<div class="section-hint">展示3行，右下角加一个点击查看更多</div>
<div class="section-grid" id="promptGrid">
<div class="placeholder-block">加载中...</div>
</div>
<a href="/font-prompts.html" class="more-btn">点击查看更多 →</a>
</div>
</div>

<div class="section-wrap">
<div class="section-card">
<div class="section-title">免费字体展示</div>
<div class="section-hint">展示4行，右下角加一个点击查看更多</div>
<div class="section-grid font-grid" id="fontGrid">
<div class="placeholder-block">加载中...</div>
</div>
<a href="/fonts.html" class="more-btn">点击查看更多 →</a>
</div>
</div>

<script src="/checkauth.js"></script>
<script>
(function(){
 fetch('/api-prompts.php?n=9')
  .then(function(r){return r.json()})
  .then(function(d){
   var g=document.getElementById('promptGrid');
   if(!d.items||!d.items.length){g.innerHTML='<div class="placeholder-block">暂无数据</div>';return;}
   g.innerHTML='';
   d.items.forEach(function(item){
    g.innerHTML+='<div class="item" onclick="location.href=\'/font-prompts.html\'"><img src="'+item.image_url+'" alt=""><p>'+item.prompt.replace(/</g,'&lt;')+'</p></div>';
   });
  })
  .catch(function(){document.getElementById('promptGrid').innerHTML='<div class="placeholder-block">加载失败</div>';});

 fetch('/api-fonts.php?n=16')
  .then(function(r){return r.json()})
  .then(function(d){
   var g=document.getElementById('fontGrid');
   if(!d.length){g.innerHTML='<div class="placeholder-block">暂无字体</div>';return;}
   g.innerHTML='';
   d.forEach(function(f){
    var preview=f.preview_text||f.font_name||'字体';
    var fname=f.font_name||preview;
    g.innerHTML+='<div class="font-item" onclick="location.href=\'/font/'+f.font_slug+'/index.html\'">'+
     '<div class="font-preview" style="font-family:\''+f.font_class+'\'">'+preview+'</div>'+
     '<div class="font-name">'+fname+'</div>'+
     '<div class="font-cat">'+(f.category||'')+'</div></div>';
   });
  })
  .catch(function(){document.getElementById('fontGrid').innerHTML='<div class="placeholder-block">加载失败</div>';});
})();
</script>
</body>
</html>
