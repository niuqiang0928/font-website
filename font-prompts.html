.sub-nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}.sub-nav button{padding:7px 18px;border-radius:20px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:13px;transition:all .2s}.sub-nav button:hover{border-color:#555;color:#fff}.sub-nav button.active{background:#fff;color:#000;border-color:#fff;font-weight:600}
.grid{column-count:3;-webkit-column-count:3;column-width:320px;-webkit-column-width:320px;column-gap:20px}.card{break-inside:avoid;page-break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:20px;background:#1a1a1a;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s;position:relative;display:inline-block;width:100%}.card:hover{transform:translateY(-4px)}.card img{width:100%;display:block}.card-body{padding:14px}.card-prompt{color:#aaa;font-size:13px;line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-word;overflow-wrap:anywhere}.card-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:50px;font-size:11px}.load-more{text-align:center;padding:30px;color:#666;font-size:14px}.load-more.hidden{display:none}.no-result{text-align:center;padding:60px;color:#555;font-size:15px;display:none}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;justify-content:center;align-items:center;padding:20px}.modal.active{display:flex}.modal-content{max-width:700px;width:100%;max-height:90vh;overflow-y:auto;background:#1a1a1a;border-radius:16px;position:relative;scrollbar-width:none}.modal-content::-webkit-scrollbar{display:none}.modal-close{position:absolute;top:16px;right:16px;background:#333;border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}.modal-sheet-bar{display:none}.modal-img{width:100%;border-radius:16px 16px 0 0;display:block;max-height:500px;object-fit:contain;background:#111}.modal-body{padding:24px}.modal-meta{display:none}.modal-prompt{color:#ccc;font-size:15px;line-height:1.8;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;text-align:left;margin-bottom:20px;background:#252525;padding:16px;border-radius:10px}.modal-actions{display:flex;gap:12px;align-items:center}.modal-copy{background:#fff;color:#000;border:none;padding:10px 24px;border-radius:25px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}.modal-copy:hover{background:#ececec}.modal-copy.copied{background:#2f9f58;color:#fff}.modal-copy.failed{background:#c24949;color:#fff}
@media(max-width:1100px){body{padding-top:var(--header-offset,168px)}.header-inner{flex-wrap:wrap}.header-left{flex:1 1 100%}.header-search-form{order:3;flex:1 1 100%}.auth-bar{margin-left:auto}}

@media(max-width:600px){body{padding-top:var(--header-offset,112px)}.header{top:8px;padding:0 10px}.header-inner{border-radius:18px;gap:8px;padding:9px 10px}.header-left{gap:10px;width:100%;justify-content:space-between;position:relative}.mobile-nav-toggle{display:inline-flex;align-items:center;justify-content:center}.header-nav{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;flex-direction:column;gap:6px;padding:8px;border-radius:14px;background:rgba(14,14,18,.94);border:1px solid rgba(255,255,255,.09);box-shadow:0 16px 36px rgba(0,0,0,.35)}.header-nav.open{display:flex}.header-nav a{padding:9px 12px;font-size:13px;width:100%}.header-search-form,.auth-bar{display:none}.logo img{height:28px}.container{padding:18px 10px 26px}.grid{column-count:2;-webkit-column-count:2;column-width:auto;-webkit-column-width:auto;column-gap:10px}.card{margin-bottom:10px;border-radius:16px;background:linear-gradient(180deg,#1b1b22 0%,#14141a 100%);border:1px solid rgba(255,255,255,.06);box-shadow:0 10px 24px rgba(0,0,0,.24)}.card img{border-bottom:1px solid rgba(255,255,255,.04)}.card-body{padding:10px 11px 12px}.card-prompt{font-size:12px;line-height:1.55;-webkit-line-clamp:2}.card-tag{top:8px;left:8px;font-size:10px;padding:4px 8px;background:rgba(12,12,16,.82);backdrop-filter:blur(6px)}.modal{align-items:flex-end;padding:0;background:rgba(2,2,6,.66);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.modal-content{max-width:none;width:100%;height:92vh;max-height:none;border-radius:30px 30px 0 0;border-bottom-left-radius:0;border-bottom-right-radius:0;background:linear-gradient(180deg,#181821 0%,#111117 100%);box-shadow:0 -22px 60px rgba(0,0,0,.52);animation:sheetUp .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;overflow:hidden}.modal-sheet-bar{display:block;width:52px;height:5px;border-radius:999px;background:rgba(255,255,255,.22);margin:12px auto 10px}.modal-close{top:16px;right:16px;width:40px;height:40px;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:0 18px 10px}.modal-head-title{font-size:17px;font-weight:700;color:#fff}.modal-head-sub{font-size:12px;color:rgba(255,255,255,.46);margin-top:4px}.modal-img-wrap{padding:0 14px 12px}.modal-img{width:100%;margin:0;border-radius:20px;max-height:none;height:34vh;object-fit:cover;background:#0f0f14}.modal-body{flex:1;overflow:auto;padding:4px 16px calc(108px + env(safe-area-inset-bottom))}.modal-meta{display:block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);margin:8px 0 10px}.modal-prompt{font-size:15px;line-height:1.9;padding:18px;border-radius:20px;margin-bottom:14px;background:linear-gradient(180deg,rgba(255,255,255,.055) 0%,rgba(255,255,255,.035) 100%);border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}.modal-actions{position:absolute;left:0;right:0;bottom:0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(17,17,23,0) 0%,rgba(17,17,23,.86) 20%,rgba(17,17,23,1) 55%)}.modal-copy{width:100%;min-height:54px;border-radius:18px;font-size:16px;font-weight:700;box-shadow:0 14px 30px rgba(255,255,255,.12)}.modal-copy:active{transform:scale(.985)}}@keyframes sheetUp{from{transform:translateY(26px);opacity:.5}to{transform:translateY(0);opacity:1}}
</style>
<style>
.fm-filing-overlay{display:none;position:fixed;inset:0;z-index:99999;background:#0b0b0d;align-items:center;justify-content:center;padding:24px}
.fm-filing-card{width:min(560px,100%);background:#141418;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:36px 28px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.42)}
.fm-filing-title{font-size:32px;font-weight:700;margin-bottom:10px}
.fm-filing-sub{color:rgba(255,255,255,.55);font-size:15px;line-height:1.8}

body.filing-mode>.fm-filing-overlay{display:flex !important}
</style>

<body>
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <a href="/font-index.html" class="logo"><img src="/wp-content/uploads/logo-zitipai.png" alt="logo"></a>
      <button type="button" class="mobile-nav-toggle" id="mobileNavToggle" aria-expanded="false" aria-controls="mobileNav">导航</button>
      <nav class="header-nav" id="mobileNav">
        <a href="/font-index.html">首页</a>
        <a href="/font-prompts.html" class="active">字体提示词</a>
        <a href="/fonts.html">免费字体</a>
      </nav>
    </div>
    <form class="header-search-form" id="siteSearchForm">
      <input type="text" class="header-search-input" id="siteSearchInput" placeholder="搜索字体、提示词、分类">
      <button type="submit" class="header-search-btn">搜索</button>

    <div class="auth-bar" id="authBar">
      <a href="/login.html" class="auth-link">登录</a>
      <span class="auth-sep">|</span>
      <a href="/register.html" class="auth-link">注册</a>
    </div>
  </div>
</header>
<div class="container">
  <div class="page-filter-title">筛选当前页提示词</div>
  <div class="search-bar"><input type="text" id="searchInput" placeholder="仅筛选当前提示词列表..."></div>
  <div class="sub-nav" id="subNav"><button class="active" data-cat="全部">全部</button></div>
  <div class="grid" id="grid"></div>
  <div class="load-more hidden" id="loadMore">加载中...</div>
  <div class="no-result" id="noResult">没有找到匹配的提示词</div>
</div>
<div class="modal" id="modal"><div class="modal-content"><div class="modal-sheet-bar"></div><button class="modal-close" onclick="closeModal()">×</button><div class="modal-head"><div><div class="modal-head-title">提示词详情</div><div class="modal-head-sub">长按或一键复制到剪贴板</div></div></div><div class="modal-img-wrap"><img class="modal-img" id="modalImg" src="" alt=""></div><div class="modal-body"><div class="modal-meta">字体提示词</div><p class="modal-prompt" id="modalPrompt"></p></div><div class="modal-actions"><button class="modal-copy" id="modalCopy" onclick="copyPrompt()">复制提示词</button></div></div></div>
<script src="/checkauth.js"></script>
<script>
(function(){var form=document.getElementById('siteSearchForm'),input=document.getElementById('siteSearchInput');if(!form||!input)return;var params=new URLSearchParams(window.location.search);var currentQ=(params.get('q')||'').trim();if(currentQ)input.value=currentQ;form.addEventListener('submit',function(e){e.preventDefault();var q=(input.value||'').trim();location.href='/site-search.html'+(q?'?q='+encodeURIComponent(q):'');});})();
</script>
<script>
(function(){
 var btn=document.getElementById('mobileNavToggle');
 var nav=document.getElementById('mobileNav');
 if(!btn||!nav) return;
 function closeNav(){
  nav.classList.remove('open');
  btn.setAttribute('aria-expanded','false');
 }
 btn.addEventListener('click',function(e){
  e.stopPropagation();
  var open=nav.classList.toggle('open');
  btn.setAttribute('aria-expanded',open?'true':'false');
 });
 nav.querySelectorAll('a').forEach(function(link){link.addEventListener('click',closeNav);});
 document.addEventListener('click',function(e){
  if(!nav.contains(e.target) && e.target!==btn && !btn.contains(e.target)) closeNav();
 });
 window.addEventListener('resize',function(){ if(window.innerWidth>600) closeNav(); });
})();
</script>
<script>
(function(){
 var header=document.querySelector('.header');
 if(!header) return;
 function updateHeaderOffset(){
  var top=parseFloat(window.getComputedStyle(header).top)||0;
  var offset=Math.ceil(header.offsetHeight+Math.max(top,0)+12);
  document.documentElement.style.setProperty('--header-offset',offset+'px');
 }
 updateHeaderOffset();
 window.addEventListener('resize',updateHeaderOffset,{passive:true});
 window.addEventListener('orientationchange',updateHeaderOffset);
 if(window.ResizeObserver){new ResizeObserver(updateHeaderOffset).observe(header);}
})();
</script>
<script>
(function(){
 var params=new URLSearchParams(window.location.search);
 var state={category:'全部',search:(params.get('q')||'').trim(),page:1,perPage:6,loading:false,hasMore:true};
 var grid=document.getElementById('grid'),loadMore=document.getElementById('loadMore'),noResult=document.getElementById('noResult'),searchInput=document.getElementById('searchInput'),subNav=document.getElementById('subNav'),allItems={};
 if(state.search) searchInput.value=state.search;
 function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
 function normalizePrompt(str){return String(str||'').replace(/\r\n?/g,'\n').split('\n').map(function(line){return line.replace(/\s+$/,'');}).join('\n').trim();}
 function buildCategoryButtons(categories){var html='<button class="'+(state.category==='全部'?'active':'')+'" data-cat="全部">全部</button>'; (categories||[]).forEach(function(cat){if(!cat||cat==='全部') return; html+='<button class="'+(state.category===cat?'active':'')+'" data-cat="'+esc(cat)+'">'+esc(cat)+'</button>';}); subNav.innerHTML=html;}
 function buildCard(item){var promptText=normalizePrompt(item.prompt); return '<div class="card" onclick="openModal('+item.id+')"><div class="card-tag">'+esc(item.category||'其他')+'</div><img src="'+esc(item.image_url||'')+'" alt="" loading="lazy"><div class="card-body"><p class="card-prompt">'+esc(promptText)+'</p></div></div>';}
 function renderItems(items,append){if(!append) grid.innerHTML=''; if(!items.length&&!append){grid.style.display='none';noResult.style.display='block';return;} grid.style.display=''; noResult.style.display='none'; items.forEach(function(item){grid.insertAdjacentHTML('beforeend',buildCard(item));});}
 async function loadItems(append){if(state.loading)return; state.loading=true; loadMore.classList.remove('hidden'); loadMore.textContent='加载中...'; try{var p=new URLSearchParams({p:state.page,n:state.perPage}); if(state.category&&state.category!=='全部') p.set('cat',state.category); if(state.search) p.set('q',state.search); var res=await fetch('/api-prompts.php?'+p.toString()); if(!res.ok) throw new Error('Network error'); var data=await res.json(); if(Array.isArray(data.categories)) buildCategoryButtons(data.categories); (data.items||[]).forEach(function(item){allItems[item.id]=item;}); renderItems(data.items||[],append); state.hasMore=!!data.has_more; loadMore.textContent=state.hasMore?'上滑加载更多':'— 已加载全部 —'; if(!state.hasMore) loadMore.classList.add('hidden');}catch(e){loadMore.textContent='加载失败，请重试';console.error(e);}finally{state.loading=false;}}
 function resetAndLoad(){state.page=1;state.hasMore=true;allItems={};grid.innerHTML='';loadMore.classList.remove('hidden');loadMore.textContent='加载中...';loadItems(false);}
 subNav.addEventListener('click',function(e){var btn=e.target.closest('button'); if(!btn) return; subNav.querySelectorAll('button').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); state.category=btn.dataset.cat; resetAndLoad();});
 var searchTimer; searchInput.addEventListener('input',function(){clearTimeout(searchTimer); searchTimer=setTimeout(function(){state.search=searchInput.value.trim(); resetAndLoad();},400);});
 var scrollTimer; window.addEventListener('scroll',function(){if(state.loading||!state.hasMore) return; clearTimeout(scrollTimer); scrollTimer=setTimeout(function(){var scrollH=document.documentElement.scrollHeight, clientH=document.documentElement.clientHeight, scrollTop=document.documentElement.scrollTop; if(scrollTop+clientH>=scrollH-400){state.page++; loadItems(true);}},200);});
 window.openModal=function(id){var item=allItems[id]; if(!item) return; document.getElementById('modalImg').src=item.image_url; document.getElementById('modalPrompt').textContent=normalizePrompt(item.prompt); document.getElementById('modal').classList.add('active'); document.body.classList.add('modal-open');document.body.style.overflow='hidden';};
 window.closeModal=function(){document.getElementById('modal').classList.remove('active'); document.body.classList.remove('modal-open');document.body.style.overflow='';};
 document.getElementById('modal').addEventListener('click',function(e){if(e.target===this) closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape') closeModal();});
 window.copyPrompt=function(){var text=(document.getElementById('modalPrompt').textContent||'').trim(); var btn=document.getElementById('modalCopy'); if(!text){btn.textContent='没有可复制内容'; btn.classList.add('failed'); setTimeout(function(){btn.textContent='复制提示词'; btn.classList.remove('failed');},1600); return;} function copied(){btn.textContent='已复制!'; btn.classList.remove('failed'); btn.classList.add('copied'); setTimeout(function(){btn.textContent='复制提示词'; btn.classList.remove('copied');},1500);} function failed(){btn.textContent='复制失败'; btn.classList.remove('copied'); btn.classList.add('failed'); setTimeout(function(){btn.textContent='复制提示词'; btn.classList.remove('failed');},1600);} if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(copied).catch(function(){fallbackCopy(text,copied,failed);});}else{fallbackCopy(text,copied,failed);} }; function fallbackCopy(text,onSuccess,onFail){try{var ta=document.createElement('textarea'); ta.value=text; ta.setAttribute('readonly','readonly'); ta.style.position='fixed'; ta.style.opacity='0'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,ta.value.length); var ok=document.execCommand('copy'); document.body.removeChild(ta); ok?onSuccess():onFail();}catch(e){onFail();}};
 buildCategoryButtons([]); loadItems(false);
})();
</script>
<script>
(function(){
  function enable(){
    if(!document.body || document.body.classList.contains('filing-mode')) return;
    var overlay=document.createElement('div');
    overlay.className='fm-filing-overlay';
    overlay.innerHTML='<div class="fm-filing-card"><div class="fm-filing-title">网站备案中</div><div class="fm-filing-sub">站点内容暂时关闭，备案完成后恢复访问。</div></div>';
    document.body.appendChild(overlay);
    document.body.classList.add('filing-mode');
  }
  window.__fmEnableFilingMode=enable;
  fetch('/wp-json/font-manager/v1/home-assets',{cache:'no-store'})
    .then(function(r){return r.ok ? r.json() : null;})
    .then(function(data){ if(data && data.filing_mode){ enable(); } })
    .catch(function(){});
})();
</script>
